<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Boots n Cats n</title>
  <style>
    :root{
      --bg1:#0b0b18;
      --bg2:#181833;
      --text:#fff;
      --muted:rgba(255,255,255,.7);
      --line:rgba(255,255,255,.16);
      --hot:#8b5cff;
      --hot2:#00d9ff;
      --hot3:#ff5fa2;
      --card:rgba(255,255,255,.08);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%}
    body{
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:20px;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(139,92,255,.35), transparent 32%),
        radial-gradient(circle at 80% 20%, rgba(0,217,255,.25), transparent 35%),
        radial-gradient(circle at 50% 100%, rgba(255,95,162,.18), transparent 35%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      overflow:hidden;
    }

    .wrap{
      width:min(560px,100%);
      position:relative;
    }

    .halo{
      position:absolute;
      inset:-60px;
      border-radius:999px;
      filter:blur(40px);
      opacity:.32;
      z-index:-1;
      background:conic-gradient(from 180deg, var(--hot), transparent, var(--hot2), transparent, var(--hot3), var(--hot));
      animation:spin 9s linear infinite;
    }

    .card{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border-radius:30px;
      padding:26px;
      box-shadow:0 26px 70px rgba(0,0,0,.35);
    }

    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:16px;
    }

    .logo{
      width:54px;height:54px;border-radius:18px;
      display:grid;place-items:center;
      font-size:24px;font-weight:900;
      background:linear-gradient(135deg,var(--hot),var(--hot2));
      box-shadow:0 0 28px rgba(0,217,255,.25);
    }

    .badge{
      font-size:13px;
      color:var(--muted);
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.15);
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(34px, 10vw, 62px);
      line-height:.92;
      letter-spacing:-.06em;
    }

    p{
      margin:0;
      color:var(--muted);
      line-height:1.55;
      font-size:16px;
    }

    .stage{
      margin:28px 0 18px;
      height:250px;
      position:relative;
      display:grid;
      place-items:center;
    }

    .ring{
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.16);
      animation:breathe 2.4s ease-in-out infinite;
    }
    .ring.r1{width:150px;height:150px}
    .ring.r2{width:195px;height:195px;opacity:.55;animation-delay:.25s}
    .ring.r3{width:240px;height:240px;opacity:.3;animation-delay:.5s}

    .core{
      width:126px;height:126px;border-radius:50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.95), rgba(255,255,255,.28) 18%, transparent 34%),
        linear-gradient(135deg,var(--hot),var(--hot2));
      box-shadow:0 0 50px rgba(139,92,255,.5), 0 0 90px rgba(0,217,255,.18);
      transform:scale(.94);
      transition:transform .11s ease, filter .11s ease;
    }

    .bars{
      position:absolute;
      bottom:14px;
      display:flex;
      align-items:flex-end;
      gap:8px;
      height:64px;
    }

    .bar{
      width:10px;
      height:14px;
      border-radius:999px;
      background:rgba(255,255,255,.38);
      transition:height .09s ease, background .09s ease;
    }

    .phrase{
      margin-top:-2px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      min-height:48px;
    }

    .token{
      min-width:88px;
      text-align:center;
      padding:10px 14px;
      border-radius:16px;
      font-weight:900;
      letter-spacing:.04em;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.86);
      transform:scale(1);
      transition:transform .12s ease, background .12s ease, box-shadow .12s ease, color .12s ease;
    }

    .token.active{
      background:linear-gradient(135deg, rgba(139,92,255,.6), rgba(0,217,255,.45));
      color:#fff;
      transform:scale(1.07);
      box-shadow:0 0 24px rgba(0,217,255,.18);
    }

    .status{
      margin-top:16px;
      min-height:48px;
      padding:13px 15px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.14);
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .controls{
      margin-top:16px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    button{
      min-height:58px;
      border:0;
      cursor:pointer;
      border-radius:18px;
      padding:14px 16px;
      font-size:16px;
      font-weight:850;
      color:#fff;
      transition:transform .12s ease, opacity .12s ease;
      touch-action:manipulation;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.11);
    }
    button:active{transform:scale(.975)}
    .accept{
      grid-column:1/-1;
      background:linear-gradient(135deg,var(--hot),var(--hot2));
      box-shadow:0 14px 32px rgba(0,217,255,.18);
    }
    .stop{background:rgba(255,95,162,.16)}
    .test{background:rgba(255,255,255,.09)}
    .disabled{opacity:.45;pointer-events:none}

    .tiny{
      margin-top:16px;
      text-align:center;
      color:rgba(255,255,255,.5);
      font-size:12.5px;
    }

    body.playing .core{
      animation:pulse 390ms ease-in-out infinite;
      filter:saturate(1.2);
    }

    body.playing .bar:nth-child(1){animation:dance 400ms ease-in-out infinite}
    body.playing .bar:nth-child(2){animation:dance 270ms ease-in-out infinite 30ms}
    body.playing .bar:nth-child(3){animation:dance 520ms ease-in-out infinite 50ms}
    body.playing .bar:nth-child(4){animation:dance 310ms ease-in-out infinite 10ms}
    body.playing .bar:nth-child(5){animation:dance 470ms ease-in-out infinite 70ms}
    body.playing .bar:nth-child(6){animation:dance 350ms ease-in-out infinite 20ms}
    body.playing .bar:nth-child(7){animation:dance 580ms ease-in-out infinite 80ms}
    body.playing .bar:nth-child(8){animation:dance 290ms ease-in-out infinite 20ms}

    @keyframes pulse{
      0%,100%{transform:scale(.94)}
      45%{transform:scale(1.07)}
    }
    @keyframes breathe{
      0%,100%{transform:scale(.92);opacity:.18}
      50%{transform:scale(1.12);opacity:.55}
    }
    @keyframes dance{
      0%,100%{height:14px;background:rgba(255,255,255,.38)}
      50%{height:58px;background:rgba(0,217,255,.9);box-shadow:0 0 18px rgba(0,217,255,.45)}
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    @media (max-width:430px){
      .card{padding:22px;border-radius:24px}
      .controls{grid-template-columns:1fr}
      .accept{grid-column:auto}
      .token{min-width:74px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="halo"></div>
    <section class="card">
      <div class="head">
        <div class="logo">B♩</div>
        <div class="badge" id="supportBadge">Checking vibration...</div>
      </div>

      <h1>Boots n<br>Cats n</h1>
      <p>
        Tap accept and your phone will buzz a “boots n cats n” beat using the vibration motor.
      </p>

      <div class="stage" aria-hidden="true">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="core"></div>
        <div class="bars">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </div>

      <div class="phrase">
        <div class="token" id="t0">BOOTS</div>
        <div class="token" id="t1">n</div>
        <div class="token" id="t2">CATS</div>
        <div class="token" id="t3">n</div>
      </div>

      <div class="status" id="status">
        Ready. Tap Accept to start the “boots n cats n” vibration beat.
      </div>

      <div class="controls">
        <button class="accept" id="acceptBtn">Accept & Play</button>
        <button class="test" id="testBtn">Test Buzz</button>
        <button class="stop disabled" id="stopBtn">Stop</button>
      </div>

      <div class="tiny">
        Best on Android browsers. iPhone browsers often do not allow web vibration.
      </div>
    </section>
  </main>

  <script>
    const supportBadge = document.getElementById("supportBadge");
    const statusBox = document.getElementById("status");
    const acceptBtn = document.getElementById("acceptBtn");
    const stopBtn = document.getElementById("stopBtn");
    const testBtn = document.getElementById("testBtn");
    const tokens = [
      document.getElementById("t0"),
      document.getElementById("t1"),
      document.getElementById("t2"),
      document.getElementById("t3")
    ];

    const canVibrate = "vibrate" in navigator;
    let loopTimer = null;
    let cueTimers = [];
    let isPlaying = false;

    // A simple "boots n cats n" loop:
    // BOOTS = longer kick pulse
    // n     = tiny short pulse
    // CATS  = medium snare pulse
    // n     = tiny short pulse
    // Repeat x2 in one phrase for a better groove.
    const beatPattern = [
      140, 90,   // BOOTS
      24, 70,    // n
      90, 95,    // CATS
      24, 110,   // n

      140, 90,   // BOOTS
      24, 70,    // n
      90, 95,    // CATS
      24, 180    // n, then phrase break
    ];

    // Visual cue timings for each spoken piece in the loop
    const cues = [
      { t: 0, token: 0 },
      { t: 230, token: 1 },
      { t: 324, token: 2 },
      { t: 509, token: 3 },

      { t: 643, token: 0 },
      { t: 873, token: 1 },
      { t: 967, token: 2 },
      { t: 1152, token: 3 }
    ];

    function patternLength(pattern){
      return pattern.reduce((a,b)=>a+b,0);
    }

    function setStatus(msg){
      statusBox.textContent = msg;
    }

    function clearActiveTokens(){
      tokens.forEach(t => t.classList.remove("active"));
    }

    function pulseToken(index){
      clearActiveTokens();
      tokens[index].classList.add("active");
      setTimeout(() => tokens[index].classList.remove("active"), 170);
    }

    function runVisualCues(){
      cueTimers.forEach(id => clearTimeout(id));
      cueTimers = [];
      cues.forEach(cue => {
        cueTimers.push(setTimeout(() => {
          if (isPlaying) pulseToken(cue.token);
        }, cue.t));
      });
    }

    function doVibrate(pattern){
      if (!canVibrate) return false;
      return navigator.vibrate(pattern);
    }

    function playPhrase(){
      document.body.classList.add("playing");
      runVisualCues();
      return doVibrate(beatPattern);
    }

    function startBeat(){
      if (isPlaying) return;
      isPlaying = true;

      acceptBtn.classList.add("disabled");
      acceptBtn.textContent = "Playing";
      stopBtn.classList.remove("disabled");

      const ok = playPhrase();

      if (!canVibrate) {
        setStatus("This browser does not support vibration, so only the visual beat is playing.");
      } else if (ok) {
        setStatus('Playing: "boots n cats n". Keep this page open.');
      } else {
        setStatus("The vibration request was sent, but this device/browser may not actually vibrate.");
      }

      const loopLen = patternLength(beatPattern) + 60;
      loopTimer = setInterval(() => {
        if (!isPlaying) return;
        playPhrase();
      }, loopLen);
    }

    function stopBeat(){
      isPlaying = false;
      clearInterval(loopTimer);
      cueTimers.forEach(id => clearTimeout(id));
      cueTimers = [];
      clearActiveTokens();
      document.body.classList.remove("playing");
      if (canVibrate) navigator.vibrate(0);

      acceptBtn.classList.remove("disabled");
      acceptBtn.textContent = "Accept & Play";
      stopBtn.classList.add("disabled");
      setStatus('Stopped. Tap Accept to play "boots n cats n" again.');
    }

    function testBuzz(){
      if (!canVibrate){
        setStatus("No vibration support detected on this browser/device.");
        return;
      }
      navigator.vibrate([120, 60, 35]);
      pulseToken(0);
      setStatus("Test buzz sent.");
    }

    supportBadge.textContent = canVibrate ? "Vibration supported" : "No vibration support";

    acceptBtn.addEventListener("click", startBeat);
    stopBtn.addEventListener("click", stopBeat);
    testBtn.addEventListener("click", testBuzz);

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopBeat();
    });
  </script>
</body>
</html>
