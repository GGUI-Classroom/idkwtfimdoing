<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VibeBeat</title>
  <style>
    :root {
      --bg1: #090916;
      --bg2: #17172d;
      --card: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.18);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --hot: #7c5cff;
      --hot2: #00e5ff;
      --danger: #ff4d8d;
      --ok: #44ffb0;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(124, 92, 255, 0.35), transparent 35%),
        radial-gradient(circle at 80% 25%, rgba(0, 229, 255, 0.28), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .shell {
      width: min(560px, 100%);
      position: relative;
    }

    .glow {
      position: absolute;
      inset: -80px -30px;
      pointer-events: none;
      filter: blur(40px);
      opacity: 0.35;
      background:
        conic-gradient(from 220deg, var(--hot), transparent, var(--hot2), transparent, var(--danger), var(--hot));
      animation: spin 10s linear infinite;
      border-radius: 999px;
      z-index: -1;
    }

    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.06));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 32px;
      padding: 28px;
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 26px;
    }

    .logo {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 26px;
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.95), rgba(0, 229, 255, 0.88));
      box-shadow: 0 0 34px rgba(0, 229, 255, 0.32);
    }

    .badge {
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.15);
    }

    h1 {
      font-size: clamp(39px, 10vw, 72px);
      line-height: 0.9;
      letter-spacing: -0.075em;
      margin: 0 0 14px;
    }

    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      margin: 0;
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      margin: 34px 0 26px;
      height: 210px;
    }

    .orb {
      width: 142px;
      height: 142px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, white, rgba(255, 255, 255, 0.35) 16%, transparent 31%),
        linear-gradient(135deg, var(--hot), var(--hot2));
      box-shadow:
        0 0 55px rgba(124, 92, 255, 0.6),
        0 0 100px rgba(0, 229, 255, 0.25);
      transform: scale(0.92);
      transition: transform 130ms ease, filter 130ms ease;
    }

    .ring {
      position: absolute;
      width: 165px;
      height: 165px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      animation: breathe 2.2s ease-in-out infinite;
    }

    .ring:nth-child(2) {
      width: 205px;
      height: 205px;
      opacity: 0.5;
      animation-delay: 0.35s;
    }

    .bars {
      position: absolute;
      bottom: 7px;
      display: flex;
      align-items: end;
      gap: 8px;
      height: 58px;
    }

    .bar {
      width: 10px;
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      transition: height 90ms ease, background 90ms ease, box-shadow 90ms ease;
    }

    .status {
      min-height: 46px;
      padding: 13px 15px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.14);
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 20px;
      min-height: 58px;
      padding: 14px 16px;
      font-weight: 800;
      font-size: 16px;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      transition: transform 140ms ease, opacity 140ms ease, filter 140ms ease;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.97);
    }

    .accept {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, var(--hot), var(--hot2));
      box-shadow: 0 12px 32px rgba(0, 229, 255, 0.22);
    }

    .stop {
      background: rgba(255, 77, 141, 0.16);
    }

    .test {
      background: rgba(68, 255, 176, 0.13);
    }

    .disabled {
      opacity: 0.42;
      pointer-events: none;
    }

    .tiny {
      margin-top: 18px;
      font-size: 12.5px;
      color: rgba(255, 255, 255, 0.52);
      text-align: center;
    }

    body.playing .orb {
      animation: pulse 360ms ease-in-out infinite;
      filter: saturate(1.25);
    }

    body.playing .bar:nth-child(1) { animation: dance 420ms ease-in-out infinite; }
    body.playing .bar:nth-child(2) { animation: dance 300ms ease-in-out infinite 40ms; }
    body.playing .bar:nth-child(3) { animation: dance 520ms ease-in-out infinite 70ms; }
    body.playing .bar:nth-child(4) { animation: dance 260ms ease-in-out infinite 20ms; }
    body.playing .bar:nth-child(5) { animation: dance 430ms ease-in-out infinite 90ms; }
    body.playing .bar:nth-child(6) { animation: dance 340ms ease-in-out infinite 60ms; }
    body.playing .bar:nth-child(7) { animation: dance 600ms ease-in-out infinite 100ms; }
    body.playing .bar:nth-child(8) { animation: dance 310ms ease-in-out infinite 10ms; }
    body.playing .bar:nth-child(9) { animation: dance 470ms ease-in-out infinite 80ms; }

    @keyframes pulse {
      0%, 100% { transform: scale(0.92); }
      45% { transform: scale(1.07); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(0.9); opacity: 0.18; }
      50% { transform: scale(1.14); opacity: 0.55; }
    }

    @keyframes dance {
      0%, 100% {
        height: 14px;
        background: rgba(255, 255, 255, 0.42);
        box-shadow: none;
      }
      50% {
        height: 54px;
        background: rgba(0, 229, 255, 0.9);
        box-shadow: 0 0 18px rgba(0, 229, 255, 0.55);
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 420px) {
      .card {
        padding: 22px;
        border-radius: 26px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .accept {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="glow"></div>

    <section class="card">
      <div class="top">
        <div class="logo">〽</div>
        <div class="badge" id="supportBadge">Checking vibration...</div>
      </div>

      <h1>Vibe<br>Beat</h1>
      <p>Tap accept and your phone will play a little beat through the vibration motor. No audio, just haptics.</p>

      <div class="stage" aria-hidden="true">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="orb"></div>
        <div class="bars">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </div>

      <div class="status" id="status">
        Ready. Tap Accept to start the haptic beat.
      </div>

      <div class="controls">
        <button class="accept" id="acceptBtn">Accept & Play Beat</button>
        <button class="test" id="testBtn">Test Buzz</button>
        <button class="stop disabled" id="stopBtn">Stop</button>
      </div>

      <div class="tiny">
        Best on Android Chrome / Samsung Internet. Some browsers or phones may ignore vibration.
      </div>
    </section>
  </main>

  <script>
    const statusBox = document.getElementById("status");
    const supportBadge = document.getElementById("supportBadge");
    const acceptBtn = document.getElementById("acceptBtn");
    const stopBtn = document.getElementById("stopBtn");
    const testBtn = document.getElementById("testBtn");

    const canVibrate = "vibrate" in navigator;

    let beatTimer = null;
    let visualTimer = null;
    let isPlaying = false;

    /*
      Vibration patterns alternate:
      [vibrate, pause, vibrate, pause, vibrate...]

      Since vibration motors cannot play real notes, this makes a beat
      using short and long pulses.
    */
    const beatPattern = [
      90, 55,   35, 45,   35, 145,  // kick + tiny double
      45, 60,   130, 120,           // snare
      35, 45,   35, 55,   80, 175,  // hats + kick
      45, 50,   45, 50,   160, 210, // roll + snare
      95, 60,   35, 40,   35, 80,
      140, 90,  55, 45,   55, 160,
      35, 35,   35, 35,   35, 35,   180, 260
    ];

    const fillPattern = [
      35, 30, 35, 30, 35, 30, 35, 30,
      70, 45, 70, 45, 180
    ];

    function setStatus(message) {
      statusBox.textContent = message;
    }

    function beatLength(pattern) {
      return pattern.reduce((total, ms) => total + ms, 0);
    }

    function flashOrb() {
      document.body.classList.add("playing");
      clearTimeout(visualTimer);
      visualTimer = setTimeout(() => {
        if (!isPlaying) document.body.classList.remove("playing");
      }, 350);
    }

    function vibrate(pattern) {
      if (!canVibrate) return false;
      return navigator.vibrate(pattern);
    }

    function playOnce(pattern = beatPattern) {
      flashOrb();
      return vibrate(pattern);
    }

    function startBeat() {
      if (isPlaying) return;

      isPlaying = true;
      document.body.classList.add("playing");
      stopBtn.classList.remove("disabled");
      acceptBtn.textContent = "Beat Playing";
      acceptBtn.classList.add("disabled");

      if (!canVibrate) {
        setStatus("Your browser does not support vibration, so only the animation is playing.");
      } else {
        const worked = playOnce(beatPattern);
        setStatus(worked ? "Playing haptic beat. Keep this page open." : "The browser accepted the tap, but this device may not vibrate.");
      }

      const loopDelay = beatLength(beatPattern) + 120;

      beatTimer = setInterval(() => {
        if (!isPlaying) return;
        playOnce(beatPattern);
      }, loopDelay);
    }

    function stopBeat() {
      isPlaying = false;
      clearInterval(beatTimer);
      clearTimeout(visualTimer);
      document.body.classList.remove("playing");

      if (canVibrate) navigator.vibrate(0);

      stopBtn.classList.add("disabled");
      acceptBtn.classList.remove("disabled");
      acceptBtn.textContent = "Accept & Play Beat";
      setStatus("Stopped. Tap Accept to play it again.");
    }

    function testBuzz() {
      if (!canVibrate) {
        setStatus("This browser does not expose navigator.vibrate, so the test buzz cannot run.");
        return;
      }

      const worked = vibrate(fillPattern);
      flashOrb();
      setStatus(worked ? "Test buzz sent." : "The vibration command returned false on this device.");
    }

    if (canVibrate) {
      supportBadge.textContent = "Vibration supported";
    } else {
      supportBadge.textContent = "No vibration support";
    }

    acceptBtn.addEventListener("click", startBeat);
    stopBtn.addEventListener("click", stopBeat);
    testBtn.addEventListener("click", testBuzz);

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopBeat();
    });
  </script>
</body>
</html>
